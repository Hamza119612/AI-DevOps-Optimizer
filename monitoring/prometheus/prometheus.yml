# Prometheus Configuration
# Scrapes the AI DevOps Optimizer app and itself.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # AI DevOps Optimizer application
  - job_name: "ai-devops-optimizer"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:3000"]
        labels:
          service: "ai-devops-optimizer"
          environment: "development"
