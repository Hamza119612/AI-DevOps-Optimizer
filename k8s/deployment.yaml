apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-optimizer
  labels:
    app: ai-devops-optimizer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-optimizer
  template:
    metadata:
      labels:
        app: ai-devops-optimizer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ai-devops-optimizer
          image: hamzao119/devops-assistant:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-devops-optimizer-secrets
                  key: openai-api-key
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
