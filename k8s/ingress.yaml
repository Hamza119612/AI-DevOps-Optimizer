apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-devops-optimizer
  labels:
    app: ai-devops-optimizer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: ai-devops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-devops-optimizer
                port:
                  name: http
