name: CD — Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Helm Deploy
    runs-on: ubuntu-latest
    # Only run if CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        id: kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "KUBECONFIG secret is not set. Skipping deployment."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Create NVIDIA NIM secret
        if: steps.kubeconfig.outputs.skip != 'true'
        run: |
          kubectl create secret generic ai-devops-optimizer-secrets \
            --from-literal=nvidia-api-key="${{ secrets.NVIDIA_API_KEY }}" \
            --from-literal=nvidia-model="${{ vars.NVIDIA_MODEL || 'meta/llama-3.3-70b-instruct' }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        if: steps.kubeconfig.outputs.skip != 'true'
        run: |
          helm upgrade --install ai-devops-optimizer ./helm/ai-devops-optimizer \
            --namespace default \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set llm.enabled=true \
            --wait \
            --timeout 5m
