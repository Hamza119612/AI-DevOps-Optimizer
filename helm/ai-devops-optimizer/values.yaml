# Default values for ai-devops-optimizer Helm chart

replicaCount: 2

image:
  repository: hamzao119/devops-assistant
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  host: ai-devops.local
  annotations: {}
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  NODE_ENV: production
  PORT: "3000"

# NVIDIA NIM LLM integration
llm:
  enabled: false
  # Name of the K8s Secret containing NVIDIA credentials
  secretName: ai-devops-optimizer-secrets
  # Key within the secret that holds the NVIDIA API key
  apiKeySecretKey: nvidia-api-key
  # Key within the secret that holds the model name (optional)
  modelSecretKey: nvidia-model
